name: GhostStack CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run healthcheck
      - run: npm test

  floci-integration:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: docker compose -f docker/docker-compose.floci.yaml up -d floci
      - run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4566/health && exit 0
            sleep 2
          done
          exit 1
      - run: npm test -- tests/floci-integration.test.ts
        env:
          GHOSTSTACK_FLOCI_INTEGRATION: "1"
          GHOSTSTACK_FLOCI_STRICT: "1"
          GHOSTSTACK_OFFLINE_MODE: "false"
